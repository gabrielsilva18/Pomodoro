
<div class= "input-timer">

  <input type="number" placeholder="Duração do Pomodoro (minutos)" #durationPomodoro>
  <button (click)="setWorkDuration(durationPomodoro.value)">
    Definir Duração
  </button>
</div>


<div class="timer">
  <h1>Pomodoro</h1>
  
  <div class="timer-display">
    {{ timer() }}
  </div>

  <button 
    class="main-button" 
    [class.paused]="isRunning()"
    (click)="toggleTimer()">
    {{ isRunning() ? 'PAUSAR' : 'INICIAR' }}
  </button>

  <div class="actions">
    <button class="secondary-button reset-button" (click)="resetTimer()">
      Reset
    </button>
  
  </div>

  <p class="status">
    {{ workDuration() ? 'Pronto para focar!' : 'Configure a duração primeiro' }}
  </p>
</div>
