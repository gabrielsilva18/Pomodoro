<div class="timer">

  <h1>Pomodoro</h1>

  <!-- INPUT DE DURAÇÃO -->
  <div class="input-timer">
    <input 
      type="number" 
      placeholder="Duração (min)"
      #durationPomodoro
      min="1"
    >
    <button 
      (click)="setWorkDuration(durationPomodoro.value)"
      [disabled]="!durationPomodoro.value">
      Definir
    </button>
  </div>

  <!-- DISPLAY DO TEMPO -->
  <div class="timer-display">
    {{ timer() }}
  </div>

  <!-- BOTÃO PRINCIPAL -->
  <button 
    class="main-button" 
    [class.paused]="isRunning()"
    (click)="toggleTimer()">
    {{ isRunning() ? 'PAUSAR' : 'INICIAR' }}
  </button>

  <!-- AÇÕES -->
  <div class="actions">
    <button 
      class="secondary-button reset-button" 
      (click)="resetTimer()">
      Reset
    </button>
  </div>

  <!-- STATUS DINÂMICO -->
  <p class="status">
    {{ message() }}
  </p>

</div>
